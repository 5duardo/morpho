<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morpho</title>
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-logo" src="assets/logo.png" alt="" />
          <div>
            <strong>Morpho</strong>
            <small>Conversor multimedia</small>
          </div>
        </div>
        <nav class="nav">
          <button class="nav-item active" data-view="converter"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 7h8.6l-2.3-2.3L14.7 3 20 8.3l-5.3 5.3-1.4-1.7 2.3-2.3H7V7Zm10 10H8.4l2.3 2.3L9.3 21 4 15.7l5.3-5.3 1.4 1.7-2.3 2.3H17v2.6Z"/></svg></span>Convertir</button>
          <button class="nav-item" data-view="history"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 1 1-8.1 5H2V6h6v6H6v-2.6A7 7 0 1 0 13 5V3Zm-1 4h2v5.1l3.1 3.1-1.4 1.4-3.7-3.7V7Z"/></svg></span>Historial</button>
          <button class="nav-item" data-view="favorites"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z"/></svg></span>Favoritos</button>
        </nav>
        <div class="sidebar-footer">
          <label class="switch">
            <input id="themeToggle" type="checkbox" checked />
            <span>Tema oscuro</span>
          </label>
          <select id="languageSelect" aria-label="Idioma">
            <option value="es">ES</option>
            <option value="en">EN</option>
          </select>
        </div>
      </aside>

      <main class="content">
        <section id="converterView" class="view active">
          <header class="topbar">
            <div>
              <p class="eyebrow">Batch processing</p>
              <h1>Convierte video, audio e imagen en lote</h1>
            </div>
            <div class="actions">
              <button id="selectFilesBtn" class="primary"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h7l2 2h7v12H4V5Zm2 4v8h12V9H6Zm5 1h2v2h2v2h-2v2h-2v-2H9v-2h2v-2Z"/></svg></span>Seleccionar archivos</button>
              <button id="selectOutputBtn" class="ghost"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3 6h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6Zm2 4v8h14v-8H5Z"/></svg></span>Carpeta</button>
            </div>
          </header>

          <section id="dropZone" class="drop-zone">
            <span class="drop-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M11 4h2v8.2l2.6-2.6L17 11l-5 5-5-5 1.4-1.4 2.6 2.6V4Zm-6 13h2v2h10v-2h2v4H5v-4Z"/></svg></span>
            <div>
              <strong>Arrastra archivos aqui</strong>
              <span>MP4, AVI, MOV, MKV, WEBM, JPG, PNG, WEBP, BMP, GIF, MP3, WAV, AAC, OGG, FLAC</span>
            </div>
          </section>

          <section class="toolbar">
            <label>
              Formato global
              <select id="globalFormat"></select>
            </label>
            <label>
              Exportar en
              <input id="outputDirectory" type="text" readonly placeholder="Descargas/Morpho" />
            </label>
            <button id="saveFavoriteBtn" class="ghost"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="m12 3 2.8 5.7 6.2.9-4.5 4.4 1.1 6.2L12 17.3l-5.6 2.9 1.1-6.2L3 9.6l6.2-.9L12 3Z"/></svg></span>Guardar preset</button>
            <button id="convertBtn" class="primary"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 7h8.6l-2.3-2.3L14.7 3 20 8.3l-5.3 5.3-1.4-1.7 2.3-2.3H7V7Zm10 10H8.4l2.3 2.3L9.3 21 4 15.7l5.3-5.3 1.4 1.7-2.3 2.3H17v2.6Z"/></svg></span>Convertir</button>
          </section>

          <section class="progress-card">
            <div class="progress-header">
              <span>Progreso general</span>
              <strong id="overallProgressText">0%</strong>
            </div>
            <div class="progress"><span id="overallProgressBar"></span></div>
          </section>

          <section class="main-grid">
            <div class="panel file-panel">
              <div class="panel-header">
                <h2>Archivos</h2>
                <button id="clearBtn" class="ghost small"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 4h10l1 2h4v2H2V6h4l1-2Zm1 6h2v8H8v-8Zm6 0h2v8h-2v-8Zm-3 0h2v8h-2v-8Zm-5 0h12l-1 11H7L6 10Z"/></svg></span>Limpiar</button>
              </div>
              <div id="fileList" class="file-list empty"></div>
            </div>

            <div class="panel settings-panel">
              <div class="panel-header">
                <h2>Ajustes avanzados</h2>
              </div>
              <div class="tabs">
                <button class="tab active" data-settings="video">Video</button>
                <button class="tab" data-settings="audio">Audio</button>
                <button class="tab" data-settings="image">Imagen</button>
              </div>
              <div class="settings-group active" id="videoSettings">
                <label>Resolucion<select id="videoResolution"><option value="source">Original</option><option value="720p">720p</option><option value="1080p">1080p</option><option value="4k">4K</option></select></label>
                <label>Bitrate<input id="videoBitrate" value="2500k" /></label>
                <label>FPS<input id="videoFps" type="number" min="1" max="120" value="30" /></label>
              </div>
              <div class="settings-group" id="audioSettings">
                <label>Bitrate<select id="audioBitrate"><option>128k</option><option selected>192k</option><option>256k</option><option>320k</option></select></label>
                <label>Sample rate<select id="audioSampleRate"><option value="44100">44.1 kHz</option><option value="48000">48 kHz</option><option value="96000">96 kHz</option></select></label>
                <label>Canales<select id="audioChannels"><option value="stereo">Estereo</option><option value="mono">Mono</option></select></label>
              </div>
              <div class="settings-group" id="imageSettings">
                <label>Calidad<input id="imageQuality" type="range" min="1" max="100" value="85" /></label>
                <label>Ancho max.<input id="imageWidth" type="number" min="1" placeholder="Auto" /></label>
                <label>Alto max.<input id="imageHeight" type="number" min="1" placeholder="Auto" /></label>
                <label>Procesamiento<select id="concurrency"><option value="1" selected>Uno por uno</option></select></label>
              </div>
              <div class="export-actions">
                <button id="saveAllBtn" class="ghost"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5V3Zm2 2v14h10V6.2L15.8 5H15v5H9V5H7Zm4 0v3h2V5h-2Zm-1 9h4v2h-4v-2Z"/></svg></span>Guardar todos</button>
                <button id="exportZipBtn" class="ghost"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M8 3h8l4 4v14H4V3h4Zm1 2H6v14h12V8h-4V5h-3v2H9V5Zm2 2h2v2h-2V7Zm-2 2h2v2H9V9Zm2 2h2v2h-2v-2Zm-2 2h2v2H9v-2Zm2 2h2v2h-2v-2Z"/></svg></span>Exportar todo .ZIP</button>
              </div>
            </div>
          </section>
        </section>

        <section id="historyView" class="view">
          <header class="section-header">
            <h1>Historial</h1>
            <button id="clearHistoryBtn" class="ghost"><span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M7 4h10l1 2h4v2H2V6h4l1-2Zm-1 6h12l-1 11H7L6 10Zm4 2v7h2v-7h-2Zm4 0v7h2v-7h-2Z"/></svg></span>Borrar historial</button>
          </header>
          <div id="historyList" class="records"></div>
        </section>

        <section id="favoritesView" class="view">
          <header class="section-header">
            <h1>Configuraciones favoritas</h1>
          </header>
          <div id="favoriteList" class="records"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
